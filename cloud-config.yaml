# cloud-config

package_update: true
package_upgrade: false

users:
  - name: ubuntu
    groups: [sudo, admin]
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    shell: /bin/zsh
    lock_passwd: false
    passwd: "$6$rounds=4096$Si6L7R1k0S.K7G$9XkI5Gj.9G/mXvP3YvV9rY9W.VfO1G.VfO1G.VfO1G.VfO1G.VfO1G.VfO1"

chpasswd:
  expire: false

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - software-properties-common
  - git
  - unzip
  - zsh
  - fonts-powerline
  - fzf
  - tmux
  - htop
  - build-essential
  - jq
  - neovim
  - ripgrep
  - fd-find

write_files:
  - path: /etc/profile.d/custom_path.sh
    permissions: "0644"
    content: |
      export PATH=$PATH:/usr/local/bin:/usr/local/go/bin:$HOME/go/bin:/snap/bin:$HOME/.local/bin

  - path: /home/ubuntu/.config/starship.toml
    owner: ubuntu:ubuntu
    permissions: "0644"
    content: |
      add_newline = true
      [character]
      success_symbol = "[➜](bold green)"
      error_symbol = "[➜](bold red)"
      [aws]
      symbol = " "
      style = "bold #ff9900"
      [gcloud]
      symbol = " "
      style = "bold #4285f4"
      [kubernetes]
      symbol = "☸ "
      style = "bold blue"
      disabled = false
      [terraform]
      symbol = "󱁢 "
      [python]
      symbol = " "
      [nodejs]
      symbol = " "
      [golang]
      symbol = " "

  - path: /tmp/install_tools.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -x
      exec > >(tee -a /tmp/install_tools.log) 2>&1

      echo "Starting installation script at $(date)"

      wait_for_apt() {
        while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/lib/dpkg/lock >/dev/null 2>&1; do
          echo "Waiting for apt locks..."
          sleep 5
        done
      }

      # Architecture Detection
      ARCH=$(uname -m)
      if [ "$ARCH" = "x86_64" ]; then
          GO_ARCH="amd64"; AWS_ARCH="x86_64"; K9S_ARCH="x86_64"
      else
          GO_ARCH="arm64"; AWS_ARCH="aarch64"; K9S_ARCH="arm64"
      fi

      wait_for_apt

      # 1. Install Go (Global)
      if ! command -v go >/dev/null; then
        curl -OL "https://golang.org/dl/go1.23.5.linux-${GO_ARCH}.tar.gz"
        tar -C /usr/local -xzf "go1.23.5.linux-${GO_ARCH}.tar.gz"
        rm "go1.23.5.linux-${GO_ARCH}.tar.gz"
      fi

      # 2. Install Terraform (Global)
      if ! command -v terraform >/dev/null; then
        curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/hashicorp.list
        wait_for_apt
        apt-get update && apt-get install -y terraform
      fi

      # 3. Install Snaps
      snap install google-cloud-cli --classic
      snap install kubectl --classic

      # 4. Install AWS CLI
      if ! command -v aws >/dev/null; then
        curl "https://awscli.amazonaws.com/awscli-exe-linux-${AWS_ARCH}.zip" -o "awscliv2.zip"
        unzip -q awscliv2.zip
        ./aws/install
        rm -rf aws awscliv2.zip
      fi

      # 5. Install k9s
      if ! command -v k9s >/dev/null; then
        curl -sL "https://github.com/derailed/k9s/releases/download/v0.27.4/k9s_Linux_${K9S_ARCH}.tar.gz" | tar xz -C /tmp
        mv /tmp/k9s /usr/local/bin/
      fi

      # 6. USER LEVEL TOOLS (Executed as ubuntu)
      echo "Starting User Level Tools..."

      # UV & Python
      sudo -u ubuntu -i bash -c "curl -LsSf https://astral.sh/uv/install.sh | sh && .local/bin/uv python install 3.13"

      # NVM & Node
      sudo -u ubuntu -i bash -c "curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash"
      sudo -u ubuntu -i bash -c "export NVM_DIR=\"\$HOME/.nvm\" && [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\" && nvm install --lts"

      # Starship
      curl -sS https://starship.rs/install.sh | sh -s -- --yes

      # LazyVim
      if [ ! -d "/home/ubuntu/.config/nvim" ]; then
        sudo -u ubuntu git clone https://github.com/LazyVim/starter /home/ubuntu/.config/nvim
        rm -rf /home/ubuntu/.config/nvim/.git
      fi

      # Configure .zshrc
      sudo -u ubuntu touch /home/ubuntu/.zshrc
      grep -q "starship init zsh" /home/ubuntu/.zshrc || echo 'eval "$(starship init zsh)"' >> /home/ubuntu/.zshrc
      grep -q "alias vim='nvim'" /home/ubuntu/.zshrc || echo "alias vim='nvim'" >> /home/ubuntu/.zshrc
      grep -q ".local/bin" /home/ubuntu/.zshrc || echo 'export PATH=$PATH:$HOME/.local/bin' >> /home/ubuntu/.zshrc

      echo "Installation finished."

runcmd:
  - . /etc/profile.d/custom_path.sh
  - bash /tmp/install_tools.sh
  - chsh -s /bin/zsh ubuntu
