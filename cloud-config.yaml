# cloud-config

package_update: false
package_upgrade: false

users:
  - name: ubuntu
    groups: [sudo, admin]
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    shell: /bin/zsh
    lock_passwd: false
    passwd: "$6$rounds=4096$Si6L7R1k0S.K7G$9XkI5Gj.9G/mXvP3YvV9rY9W.VfO1G.VfO1G.VfO1G.VfO1G.VfO1G.VfO1"

chpasswd:
  expire: false

write_files:
  - path: /tmp/setup.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      exec > >(tee -a /var/log/custom_setup.log) 2>&1
      set -x

      echo "Starting setup at $(date)"

      wait_for_apt() {
        while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/lib/dpkg/lock >/dev/null 2>&1; do
          echo "Waiting for apt locks..."
          sleep 5
        done
      }

      # 1. System Packages
      wait_for_apt
      apt-get update
      wait_for_apt
      apt-get install -y apt-transport-https ca-certificates curl gnupg lsb-release \
        software-properties-common git unzip zsh fonts-powerline fzf tmux htop \
        build-essential jq neovim ripgrep fd-find fastfetch

      # 2. Architecture Detection
      ARCH=$(uname -m)
      if [ "$ARCH" = "x86_64" ]; then
          GO_ARCH="amd64"; AWS_ARCH="x86_64"; K9S_ARCH="x86_64"
      else
          GO_ARCH="arm64"; AWS_ARCH="aarch64"; K9S_ARCH="arm64"
      fi

      # 3. Global Tools (Root level)
      # Starship
      curl -sS https://starship.rs/install.sh | sh -s -- --yes

      # Go
      if [ ! -d "/usr/local/go" ]; then
        curl -OL "https://golang.org/dl/go1.23.5.linux-${GO_ARCH}.tar.gz"
        tar -C /usr/local -xzf "go1.23.5.linux-${GO_ARCH}.tar.gz"
        rm "go1.23.5.linux-${GO_ARCH}.tar.gz"
      fi

      # Terraform (APT)
      if ! command -v terraform >/dev/null; then
        curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" > /etc/apt/sources.list.d/hashicorp.list
        wait_for_apt
        apt-get update && apt-get install -y terraform
      fi

      # Helm (APT)
      if ! command -v helm >/dev/null; then
        curl https://baltocdn.com/helm/signing.asc | gpg --dearmor -o /usr/share/keyrings/helm.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/helm.gpg] https://baltocdn.com/helm/stable/debian/ all main" > /etc/apt/sources.list.d/helm-stable-debian.list
        wait_for_apt
        apt-get update && apt-get install -y helm
      fi

      # Ansible (Official PPA)
      if ! command -v ansible >/dev/null; then
        wait_for_apt
        add-apt-repository --yes --update ppa:ansible/ansible
        wait_for_apt
        apt-get install -y ansible
      fi

      # Cloud CLIs & Snaps
      snap install google-cloud-cli --classic
      snap install kubectl --classic

      # AWS CLI
      if ! command -v aws >/dev/null; then
        curl "https://awscli.amazonaws.com/awscli-exe-linux-${AWS_ARCH}.zip" -o "awscliv2.zip"
        unzip -q awscliv2.zip && ./aws/install && rm -rf aws awscliv2.zip
      fi

      # k9s
      if ! command -v k9s >/dev/null; then
        curl -sL "https://github.com/derailed/k9s/releases/download/v0.27.4/k9s_Linux_${K9S_ARCH}.tar.gz" | tar xz -C /usr/local/bin/ k9s
      fi

      # 4. User Configuration (ubuntu)
      mkdir -p /home/ubuntu/.config
      cat <<EOF > /home/ubuntu/.config/starship.toml
      add_newline = true
      [character]
      success_symbol = "[➜](bold green)"
      error_symbol = "[➜](bold red)"
      EOF
      chown -R ubuntu:ubuntu /home/ubuntu/.config

      # Run user-level setup
      sudo -u ubuntu -i bash <<'U_EOF'
        set -x
        # Oh My Zsh
        if [ ! -d "$HOME/.oh-my-zsh" ]; then
          sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
        fi

        # ZSH Plugins
        ZSH_CUSTOM="$HOME/.oh-my-zsh/custom"
        mkdir -p ${ZSH_CUSTOM}/plugins
        [ ! -d "${ZSH_CUSTOM}/plugins/zsh-autosuggestions" ] && git clone https://github.com/zsh-users/zsh-autosuggestions ${ZSH_CUSTOM}/plugins/zsh-autosuggestions
        [ ! -d "${ZSH_CUSTOM}/plugins/zsh-syntax-highlighting" ] && git clone https://github.com/zsh-users/zsh-syntax-highlighting ${ZSH_CUSTOM}/plugins/zsh-syntax-highlighting
        
        # Tools: UV, NVM
        curl -LsSf https://astral.sh/uv/install.sh | sh
        if [ ! -d "$HOME/.nvm" ]; then
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm install --lts
        fi

        # LazyVim
        [ ! -d "$HOME/.config/nvim" ] && git clone https://github.com/LazyVim/starter ~/.config/nvim && rm -rf ~/.config/nvim/.git

        # Final .zshrc Configuration
        cat <<'EOF_Z' > ~/.zshrc
        export ZSH="$HOME/.oh-my-zsh"
        ZSH_THEME="robbyrussell"
        
        plugins=(git zsh-autosuggestions zsh-syntax-highlighting kubectl node nvm golang tmux fzf terraform aws helm gcloud ansible)
        source $ZSH/oh-my-zsh.sh

        # NVM Configuration
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"

        # Global Paths
        export PATH=$PATH:/usr/local/bin:/usr/local/go/bin:$HOME/go/bin:/snap/bin:$HOME/.local/bin

        # Prompt & Tools
        eval "$(starship init zsh)"
        alias vim='nvim'
        fastfetch
        EOF_Z
      U_EOF

      # Final Shell enforcement
      chsh -s /bin/zsh ubuntu
      echo "Full setup finished at $(date)"

runcmd:
  - bash /tmp/setup.sh
